---
name: Development code quality
run-name: testdev
on:
  push:
    branches-ignore:
      - stable
      - main
    paths-ignore:
      - coverage.json
jobs:
  run-unittest:
    strategy:
      matrix:
        os:
          - python3.12
          - python3.11
          - python3.10
    runs-on: ${{ matrix.os }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: "Configure cache repository"
        run: |
          poetry source add --priority=default PyPiCache https://pip.git.dryusdan.net/ci_poetry/stable
          poetry config http-basic.foo ${{ secrets.PYPI_REPO_USER }} ${{ secrets.PYPI_REPO_PASSWORD }}
      - name: Install test programm
        run: poetry install --with test
      - name: Run unit test
        run: poetry run pytest
